services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: test-action-mailbox:latest
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-compose-secret-key-base}
      IMAP_HOST: ${IMAP_HOST:-greenmail}
      IMAP_PORT: ${IMAP_PORT:-3143}
      IMAP_SSL: ${IMAP_SSL:-false}
      IMAP_USERNAME: ${IMAP_USERNAME:-support}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-change-me}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_POLL_INTERVAL_MINUTES: ${IMAP_POLL_INTERVAL_MINUTES:-5}
      SMTP_HOST: ${SMTP_HOST:-greenmail}
      SMTP_PORT: ${SMTP_PORT:-3025}
      SMTP_TO: ${SMTP_TO:-support@mail.example.com}
    volumes:
      - rails-storage:/rails/storage
      - rails-log:/rails/log
      - rails-tmp:/rails/tmp
    depends_on:
      - greenmail
    restart: unless-stopped

  worker:
    image: test-action-mailbox:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -lc "./bin/rails db:prepare && ./bin/jobs"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-compose-secret-key-base}
      IMAP_HOST: ${IMAP_HOST:-greenmail}
      IMAP_PORT: ${IMAP_PORT:-3143}
      IMAP_SSL: ${IMAP_SSL:-false}
      IMAP_USERNAME: ${IMAP_USERNAME:-support}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-change-me}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_POLL_INTERVAL_MINUTES: ${IMAP_POLL_INTERVAL_MINUTES:-5}
      SMTP_HOST: ${SMTP_HOST:-greenmail}
      SMTP_PORT: ${SMTP_PORT:-3025}
      SMTP_TO: ${SMTP_TO:-support@mail.example.com}
    volumes:
      - rails-storage:/rails/storage
      - rails-log:/rails/log
      - rails-tmp:/rails/tmp
    depends_on:
      - web
      - greenmail
    restart: unless-stopped

  greenmail:
    image: greenmail/standalone:latest
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=support:change-me@mail.example.com"
    ports:
      - "3025:3025"
      - "3143:3143"
    restart: unless-stopped

volumes:
  rails-storage:
  rails-log:
  rails-tmp:
